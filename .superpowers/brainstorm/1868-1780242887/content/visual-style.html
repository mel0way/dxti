<h2>DXTI 整体视觉风格，你倾向哪一种？</h2>
<p class="subtitle">考虑这个工具给高中生/大学生用，需要年轻、有说服力但不失权威感</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>学院风 · 象牙白+深蓝</h3>
      <p>白底为主，深蓝点缀，衬线字体标题。像大学官网般庄重、可信赖。配色参考：清华紫+白</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>青春活力 · 渐变紫橙</h3>
      <p>紫色到橙色渐变，圆角卡片，大号 emoji 图标。像社交 App 一样年轻有趣，降低考试焦虑感</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>极简现代 · 黑白+单色强调</h3>
      <p>大面积留白，黑灰文字，单一强调色（如克莱因蓝）。干净利落，像 Apple 官网的克制美学</p>
    </div>
  </div>
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>国潮文创 · 朱砂红+米黄底</h3>
      <p>米黄仿古纸底色，朱砂红点缀，楷体标题。像故宫文创风格，有文化底蕴但不老气</p>
    </div>
  </div>
</div>
